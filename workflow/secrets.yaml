# ============================================================
# Tacit Settlement Workflow — Vault DON Secrets Configuration
# ============================================================
#
# Secrets are stored in the Vault DON using threshold encryption
# (Distributed Key Generation / DKG). No single node operator
# can access the complete secret. Decryption only occurs inside
# the TEE during authorized workflow execution.
#
# Format: secretsNames maps workflow secret IDs to environment
# variable names. The CRE CLI resolves each env var at upload
# time and threshold-encrypts the value across DON nodes.
#
# Usage in workflow code:
#   runtime.getSecret({ id: "OFAC_API_KEY" }).result().value
#   {{.OFAC_API_KEY}} in ConfidentialHTTPClient headers (Vault DON injection)
#
# Simulation: export env vars before `cre workflow simulate`
#   source .env && cre workflow simulate ./tacit-settlement -T local-simulation
#
# Testnet upload: `cre secrets upload` (threshold-encrypts to Vault DON)
#   source .env && cre secrets upload
#
# See: Tacit Paper, Section 5.3.3 (Vault DON and DKG)
# ============================================================

secretsNames:
  # API key for sanctions screening (OFAC SDN list)
  # Used in Step 4 via ConfidentialHTTPClient: Bearer {{.OFAC_API_KEY}}
  # Must match the key configured in Cloudflare Worker (api/sanctions/)
  OFAC_API_KEY:
    - TACIT_OFAC_API_KEY

  # API key for KYC/accreditation verification
  # Used in Step 5 via ConfidentialHTTPClient: Bearer {{.KYC_API_KEY}}
  # Must match the key configured in Cloudflare Worker (api/kyc/)
  KYC_API_KEY:
    - TACIT_KYC_API_KEY

  # Symmetric key for trade parameter encryption/decryption
  # Used in Step 2 via runtime.getSecret({ id: "ENCRYPTION_KEY" })
  # In production, replaced by DKG threshold decryption protocol
  ENCRYPTION_KEY:
    - TACIT_ENCRYPTION_KEY
